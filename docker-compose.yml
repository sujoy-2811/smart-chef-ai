version: "3.8"

services:
  smartchef-ai:
    container_name: smartchef-ai
    image: smartchef-ai:latest
    build: .
    environment:
      - PORT=${PORT:-8003}
      - NODE_ENV=production
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:$${PORT}/api/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "${PORT:-8003}:${PORT:-8003}"
    env_file:
      - backend/.env
networks:
  default:
    external:
      name: npm-network
